<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent" x1="8" y1="6" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="36" height="36" rx="10" fill="url(#bg)"/>

  <!-- 装饰光圈 -->
  <circle cx="18" cy="18" r="12" stroke="url(#accent)" stroke-width="0.6" opacity="0.3"/>
  <circle cx="18" cy="18" r="9" stroke="url(#accent)" stroke-width="0.4" opacity="0.15"/>

  <!-- AI 文字 -->
  <text x="18" y="14.5" text-anchor="middle" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="11" fill="white" letter-spacing="0.5">AI</text>

  <!-- 指南针指针 -->
  <g transform="translate(18,23)">
    <!-- 上指针（北） -->
    <polygon points="0,-6.5 2.8,1 0,-0.8 -2.8,1" fill="url(#accent)"/>
    <!-- 下指针（南） -->
    <polygon points="0,6.5 2,-0.5 0,0.5 -2,-0.5" fill="white" opacity="0.5"/>
    <!-- 中心点 -->
    <circle cx="0" cy="0" r="1.2" fill="white"/>
  </g>

  <!-- 导航线点缀 -->
  <circle cx="8" cy="10" r="1" fill="#22d3ee" opacity="0.5"/>
  <circle cx="28" cy="11" r="0.8" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="29" cy="26" r="1" fill="#22d3ee" opacity="0.35"/>
  <circle cx="7" cy="25" r="0.7" fill="#a5b4fc" opacity="0.3"/>
</svg>
