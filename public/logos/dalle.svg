<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>DALL-E</title>
  <!-- Flower/petal pattern - OpenAI style -->
  <g transform="translate(32,32)">
    <!-- Petals -->
    <ellipse cx="0" cy="-16" rx="8" ry="14" fill="#10a37f"/>
    <ellipse cx="0" cy="-16" rx="8" ry="14" fill="#10a37f" transform="rotate(60)"/>
    <ellipse cx="0" cy="-16" rx="8" ry="14" fill="#10a37f" transform="rotate(120)"/>
    <ellipse cx="0" cy="-16" rx="8" ry="14" fill="#10a37f" transform="rotate(180)"/>
    <ellipse cx="0" cy="-16" rx="8" ry="14" fill="#10a37f" transform="rotate(240)"/>
    <ellipse cx="0" cy="-16" rx="8" ry="14" fill="#10a37f" transform="rotate(300)"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="10" fill="#0d8a63"/>
    <circle cx="0" cy="0" r="6" fill="#10a37f"/>
    <!-- Highlight -->
    <circle cx="-2" cy="-2" r="3" fill="#4ade80" opacity="0.5"/>
  </g>
  <!-- Sparkles -->
  <circle cx="12" cy="12" r="2" fill="#10a37f" opacity="0.4"/>
  <circle cx="52" cy="14" r="2.5" fill="#10a37f" opacity="0.3"/>
  <circle cx="54" cy="50" r="2" fill="#10a37f" opacity="0.4"/>
  <circle cx="10" cy="50" r="1.5" fill="#10a37f" opacity="0.3"/>
</svg>