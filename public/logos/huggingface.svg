<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Hugging Face</title>
  <!-- Hugging face emoji style -->
  <circle cx="32" cy="32" r="22" fill="#ffd21e"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="28" rx="4" ry="5" fill="#1e1e1e"/>
  <ellipse cx="40" cy="28" rx="4" ry="5" fill="#1e1e1e"/>
  <!-- Eye highlights -->
  <circle cx="25" cy="27" r="1.5" fill="#ffffff"/>
  <circle cx="41" cy="27" r="1.5" fill="#ffffff"/>
  <!-- Smile -->
  <path d="M22 38Q32 48 42 38" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="16" cy="36" rx="3" ry="2" fill="#ffb300" opacity="0.6"/>
  <ellipse cx="48" cy="36" rx="3" ry="2" fill="#ffb300" opacity="0.6"/>
  <!-- HF text subtle -->
  <text x="32" y="58" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffd21e" text-anchor="middle">HF</text>
</svg>